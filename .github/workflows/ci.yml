name: CI

on:
  pull_request:
    branches: [main]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  pull_request_target:
    branches: [main]
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches: [main]
  issues:
    types:
      - opened
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Harden Runner
        if: matrix.os == 'ubuntu-latest'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "${{ matrix.python-version }}"

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --group dev

      - name: Run Ruff linter
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: uv run ruff check .

      - name: Run Ruff formatter
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: uv run ruff format --check .

      - name: Run type check
        if: matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        run: uv run ty check --exit-zero-on-warning

      - name: Run tests with coverage
        run: uv run pytest -m "not integration" --tb=short --cov=qwen3_embed
          --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && matrix.python-version == '3.13' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: coverage.xml

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
          allow-ghsas: GHSA-w8v5-vhqr-4h9v # diskcache pickle - no patch, transitive dep of llama-cpp-python

  email-notify:
    name: Email Notification
    if: >-
      (github.event_name == 'issues' || github.event_name == 'pull_request_target')
      && github.actor != 'n24q02m'
      && github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit

      - name: Parse SMTP credential
        run: |
          echo "SMTP_USER=${SMTP_CREDENTIAL%%:*}" >> $GITHUB_ENV
          echo "SMTP_PASS=${SMTP_CREDENTIAL#*:}" >> $GITHUB_ENV
        env:
          SMTP_CREDENTIAL: ${{ secrets.SMTP_CREDENTIAL }}

      - name: Send email notification
        uses: dawidd6/action-send-mail@94de994a9f6fffee200243214e17002e2920bb59 # v18
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ env.SMTP_USER }}
          password: ${{ env.SMTP_PASS }}
          subject: >-
            [${{ github.event.repository.name }}]
            ${{ github.event_name == 'issues' && 'Issue' || 'PR' }}
            #${{ github.event.issue.number || github.event.pull_request.number }}:
            ${{ github.event.issue.title || github.event.pull_request.title }}
          to: ${{ env.SMTP_USER }}
          from: GitHub Notify <${{ env.SMTP_USER }}>
          body: |
            ${{ github.event_name == 'issues' && 'New issue' || 'New pull request' }} in ${{ github.repository }}

            Title: ${{ github.event.issue.title || github.event.pull_request.title }}
            Author: ${{ github.actor }}
            URL: ${{ github.event.issue.html_url || github.event.pull_request.html_url }}
            Action: ${{ github.event.action }}

            ---
            ${{ github.event.issue.body || github.event.pull_request.body || 'No description provided.' }}
