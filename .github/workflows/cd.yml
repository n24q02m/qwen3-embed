name: CD

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - beta
          - stable

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ============================================================================
  # Release: PSR phân tích commits → bump version → CHANGELOG → tag → Release
  # ============================================================================
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.release.outputs.released }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      # Dry-run PSR (no_operation_mode => --noop: no commit/tag/push/release) purely to
      # learn the version it WOULD publish, so the PyPI-collision guard below can fire
      # BEFORE the real run creates a git tag or GitHub Release. Same action + SHA and
      # same prerelease inputs as the real step, run against the same untouched checkout.
      - uses: n24q02m/better-semantic-release@95d056deb7b7edcf6b4be69536aec70624355333 # v1.2.1
        id: dryrun
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          prerelease: ${{ inputs.release_type == 'beta' }}
          prerelease_token: beta
          no_operation_mode: true

      # PSR silently no-ops when it can't find a fix:/feat: commit since the last
      # tag -- e.g. a bot PR squash-merged with a non-conventional subject (the
      # commit-title no-bump trap the pr-title CI check guards at merge time; this
      # step is the release-time backstop for anything that slipped past it, or a
      # repo predating that check). released=false alone is not an error (it is
      # the normal outcome of a docs-only/chore-only window), so this only warns.
      - name: Warn if commits exist since last tag but PSR computed no release
        if: steps.dryrun.outputs.released != 'true'
        run: |
          set -uo pipefail
          highest_tag="$(git tag -l 'v*' | sort -V | tail -1)"
          if [ -z "$highest_tag" ]; then
            echo "No existing tags -- nothing to compare."
            exit 0
          fi
          commit_count="$(git rev-list "${highest_tag}..HEAD" --count)"
          if [ "$commit_count" -gt 0 ]; then
            echo "::warning::PSR computed no release (released=false) but ${commit_count} commit(s) exist since ${highest_tag}. This is expected if they are all chore/docs-only, but if one of them should have bumped the version (e.g. a bot-authored fix squashed with a non-conventional subject), inspect 'git log ${highest_tag}..HEAD --oneline' before assuming there is nothing to release."
          else
            echo "OK: no commits since ${highest_tag} -- released=false is expected."
          fi

      # PyPI never allows reusing a version number. Fail early and loudly if the version
      # PSR intends to publish already exists, before any tag or Release is created --
      # this turns a silent release freeze (PSR sees a matching tag, sets released=false,
      # every publish job is skipped) or an opaque upload failure deep in `uv publish`
      # into one explicit, actionable error.
      - name: Guard against re-publishing an already-published PyPI version
        if: steps.dryrun.outputs.released == 'true'
        env:
          COMPUTED_VERSION: ${{ steps.dryrun.outputs.version }}
        run: |
          set -uo pipefail
          PKG='qwen3-embed'
          URL="https://pypi.org/pypi/${PKG}/${COMPUTED_VERSION}/json"
          echo "Checking PyPI for ${PKG} ${COMPUTED_VERSION} before semantic-release tags anything..."

          # PyPI normalizes the version in the URL path (e.g. 1.2.3-beta.1 and 1.2.3b1
          # both resolve to the same release), so PSR's raw version output can be used
          # directly in the URL.
          #   200            -> exists         -> COLLISION
          #   404             -> not found      -> FREE
          #   anything else  -> network/registry error -> UNKNOWN, never treated as free
          http_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$URL")

          if [ "$http_code" = "200" ]; then
            echo "::error::Computed release version ${COMPUTED_VERSION} already exists on PyPI as ${PKG}==${COMPUTED_VERSION}. PyPI NEVER allows re-publishing a version number, even one later yanked. This almost always means the git history diverged from what was actually published to PyPI. Do NOT retry the same version: bump PAST the already-published range (higher than any version ever published) and dispatch the release again."
            exit 1
          fi

          if [ "$http_code" = "404" ]; then
            echo "OK: ${PKG}==${COMPUTED_VERSION} is not on PyPI (404) -- safe to publish."
            exit 0
          fi

          echo "::error::Could not verify whether ${PKG}==${COMPUTED_VERSION} exists on PyPI: unexpected HTTP status ${http_code} from ${URL} (likely a transient network/registry error, rate limit, or outage). Refusing to proceed so a genuine collision cannot slip through as a false 'free'. Re-run the release once the registry is reachable."
          exit 1

      - uses: n24q02m/better-semantic-release@95d056deb7b7edcf6b4be69536aec70624355333 # v1.2.1
        id: release
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          prerelease: ${{ inputs.release_type == 'beta' }}
          prerelease_token: beta

      - uses: python-semantic-release/publish-action@5a5718ce47b892ef699f2972dae122297771d641 # v10.6.1
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ steps.app-token.outputs.token }}
          tag: ${{ steps.release.outputs.tag }}

  # ============================================================================
  # Publish: Build & upload to PyPI
  # ============================================================================
  publish-pypi:
    name: Publish to PyPI
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.tag }}

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - run: uv build

      - name: Publish to PyPI
        run: uv publish

  # =================== Notify Downstream ===================
  notify-downstream:
    name: Notify Downstream
    needs: [release, publish-pypi]
    if: needs.release.outputs.released == 'true' && needs.release.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
          owner: n24q02m
          repositories: n24q02m

      - name: Dispatch core-update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/n24q02m/n24q02m/dispatches \
            -f event_type=core-update \
            -f 'client_payload[core]=qwen3-embed' \
            -f 'client_payload[version]=${{ needs.release.outputs.version }}' \
            -f 'client_payload[tag]=${{ needs.release.outputs.tag }}' \
            -f 'client_payload[release_url]=https://github.com/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }}'

  # =================== Create downstream bump issues ===================
  create-downstream-issues:
    name: Create downstream bump issues
    needs: [release, publish-pypi]
    if: needs.release.outputs.released == 'true' && needs.release.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_KEY }}
          owner: n24q02m
          repositories: wet-mcp,mnemo-mcp,better-code-review-graph

      - name: Create issues in downstream repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.release.outputs.version }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          DOWNSTREAM="wet-mcp mnemo-mcp better-code-review-graph"
          PKG_NAME="qwen3-embed"
          CHANGELOG_URL="https://github.com/n24q02m/qwen3-embed/releases/tag/${TAG}"

          for repo in $DOWNSTREAM; do
            title="chore: bump ${PKG_NAME} to ${VERSION}"
            body=$(cat <<EOF
          qwen3-embed released stable **${TAG}**.

          **Changelog:** ${CHANGELOG_URL}

          ## Action required

          Bump the \`${PKG_NAME}\` pin in \`pyproject.toml\` and regenerate lockfile:

          \`\`\`bash
          uv lock --upgrade-package ${PKG_NAME}
          \`\`\`

          Then open a PR with title \`fix: bump qwen3-embed to ${VERSION}\`.

          _Auto-created by qwen3-embed CD. See \`feedback_core_release_auto_issue.md\`._
          EOF
          )

            existing=$(gh issue list -R "n24q02m/${repo}" --search "in:title \"bump ${PKG_NAME} to ${VERSION}\"" --state all --json number --jq '.[0].number // ""')
            if [ -n "$existing" ]; then
              echo "::notice::Issue already exists in ${repo}: #${existing}"
              continue
            fi
            gh issue create -R "n24q02m/${repo}" --title "$title" --body "$body" --label "dependencies" || \
              gh issue create -R "n24q02m/${repo}" --title "$title" --body "$body" || \
              echo "::warning::Failed to create issue in $repo"
          done
